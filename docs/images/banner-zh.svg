<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;display=swap');
    </style>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="50%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" rx="20" fill="#faf8f5"/>

  <!-- Accent bar -->
  <rect width="1200" height="4" rx="2" fill="url(#accent-grad)"/>

  <!-- Left content -->
  <!-- Brand -->
  <text x="56" y="72" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#e11d48">SUPERPARTNER</text>

  <!-- Skill chip -->
  <rect x="176" y="58" width="110" height="22" rx="11" fill="none" stroke="#d6d3d1" stroke-width="1"/>
  <text x="231" y="73" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#78716c" text-anchor="middle">Claude Code Skill</text>

  <!-- Headline -->
  <text font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#1c1917">
    <tspan x="56" y="120">我終於送了一份</tspan>
    <tspan x="56" y="158">對方真正想要的禮物。</tspan>
  </text>

  <!-- Subtitle -->
  <text font-family="Inter, -apple-system, sans-serif" font-size="15" fill="#78716c">
    <tspan x="56" y="190">匯入聊天紀錄，建立伴侶完整檔案 — 性格分析、</tspan>
    <tspan x="56" y="210">興趣圖譜、禮物推薦、關係洞察。</tspan>
  </text>

  <!-- CTA pill -->
  <rect x="56" y="230" width="210" height="44" rx="22" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <text y="257" font-family="JetBrains Mono, monospace" font-size="15">
    <tspan x="76" fill="#4ade80" font-weight="600">$</tspan>
    <tspan dx="10" fill="#fb7185" font-weight="600">/</tspan><tspan fill="#fafaf9" font-weight="500">superpartner</tspan>
  </text>
  <rect x="232" y="244" width="2" height="18" rx="1" fill="#fb7185">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== Bottom badge row ===== -->

  <!-- WhatsApp badge -->
  <rect x="56" y="290" width="108" height="28" rx="14" fill="#25D366"/>
  <g transform="translate(66,296)">
    <path d="M8,0C3.6,0 0,3.3 0,7.4C0,9 0.5,10.5 1.5,11.7L0.5,15L4,13.9C5.2,14.5 6.6,14.8 8,14.8C12.4,14.8 16,11.5 16,7.4C16,3.3 12.4,0 8,0Z" fill="white" transform="scale(0.6)"/>
  </g>
  <text x="82" y="309" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">WhatsApp</text>

  <!-- WeChat badge -->
  <rect x="174" y="290" width="92" height="28" rx="14" fill="#07C160"/>
  <g transform="translate(184,296)">
    <ellipse cx="4.5" cy="5" rx="4.2" ry="3.6" fill="white" transform="scale(0.65)"/>
    <ellipse cx="9.5" cy="7.5" rx="3.5" ry="3" fill="white" opacity="0.85" transform="scale(0.65)"/>
  </g>
  <text x="198" y="309" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">WeChat</text>

  <!-- LINE badge -->
  <rect x="276" y="290" width="72" height="28" rx="14" fill="#06C755"/>
  <g transform="translate(286,296)">
    <rect x="0" y="0" width="9" height="7.5" rx="2" fill="white" transform="scale(0.65)"/>
    <polygon points="3,7.5 4.5,9.5 3.5,7.5" fill="white" transform="scale(0.65)"/>
  </g>
  <text x="298" y="309" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">LINE</text>

  <!-- Privacy badge -->
  <rect x="358" y="290" width="186" height="28" rx="14" fill="#16a34a"/>
  <g transform="translate(370,296)">
    <path d="M2.5,5 V3 C2.5,1.3 3.6,0 5,0 C6.4,0 7.5,1.3 7.5,3 V5" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" transform="scale(0.7)"/>
    <rect x="1.5" y="5" width="7" height="5" rx="1" fill="#fff" transform="scale(0.7)"/>
  </g>
  <text x="384" y="309" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff">100% 本地運行</text>

  <!-- Evidence badge -->
  <rect x="554" y="290" width="136" height="28" rx="14" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <g transform="translate(566,297)">
    <circle cx="5" cy="5" r="3.5" fill="none" stroke="#e11d48" stroke-width="1.2" transform="scale(0.6)"/>
    <line x1="7" y1="7" x2="10" y2="10" stroke="#e11d48" stroke-width="1.2" stroke-linecap="round" transform="scale(0.6)"/>
  </g>
  <text x="580" y="309" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#e11d48">有根有據的分析</text>

  <!-- Right: mini terminal -->
  <rect x="720" y="32" width="440" height="276" rx="12" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <rect x="720" y="32" width="440" height="32" rx="12" fill="#292524"/>
  <rect x="720" y="52" width="440" height="12" fill="#292524"/>
  <circle cx="738" cy="48" r="5" fill="#ff5f57"/>
  <circle cx="755" cy="48" r="5" fill="#febc2e"/>
  <circle cx="772" cy="48" r="5" fill="#28c840"/>
  <text x="940" y="52" font-family="JetBrains Mono, monospace" font-size="10" fill="#78716c" text-anchor="middle">claude code</text>

  <text font-family="JetBrains Mono, monospace" font-size="11" line-height="1.7">
    <tspan x="738" y="86" fill="#4ade80">你 </tspan><tspan fill="#fafaf9">/superpartner</tspan>
    <tspan x="738" y="106" fill="#fb7185">claude </tspan><tspan fill="#78716c">找到 </tspan><tspan fill="#fbbf24">3,241</tspan><tspan fill="#78716c"> 則訊息，WhatsApp。</tspan>
    <tspan x="738" y="130" fill="#4ade80">&#10004;</tspan><tspan fill="#e7e5e4"> 完成！重點發現：</tspan>
    <tspan x="758" y="154" fill="#fda4af">性格：</tspan><tspan fill="#e7e5e4">INFP — 真心好奇</tspan>
    <tspan x="758" y="174" fill="#fda4af">首選禮物：</tspan><tspan fill="#e7e5e4">Aesop 護手霜套裝</tspan>
    <tspan x="758" y="194" fill="#fda4af">下個日子：</tspan><tspan fill="#fbbf24">週年 — 7 月 8 日</tspan>
    <tspan x="758" y="214" fill="#fda4af">依附傾向：</tspan><tspan fill="#e7e5e4">需要明確計劃</tspan>
    <tspan x="758" y="234" fill="#fda4af">核心洞察：</tspan><tspan fill="#e7e5e4">精心時刻 &gt; 昂貴禮物</tspan>
  </text>

  <!-- Terminal bottom badges -->
  <rect x="738" y="254" width="78" height="20" rx="10" fill="#25D366" opacity="0.2"/>
  <text x="777" y="268" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#25D366" text-anchor="middle">WhatsApp</text>
  <rect x="824" y="254" width="68" height="20" rx="10" fill="#07C160" opacity="0.2"/>
  <text x="858" y="268" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#07C160" text-anchor="middle">WeChat</text>
  <rect x="900" y="254" width="50" height="20" rx="10" fill="#06C755" opacity="0.2"/>
  <text x="925" y="268" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#06C755" text-anchor="middle">LINE</text>
</svg>
